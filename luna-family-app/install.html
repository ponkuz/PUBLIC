<!doctype html>
<html lang="lt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Luna App</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fcf9ff; color: #211629; }
    main { max-width: 520px; margin: 0 auto; padding: 32px 20px; }
    .card { background: #fff; border: 1px solid #e7ddf6; border-radius: 8px; padding: 24px; }
    h1 { margin: 0 0 8px; font-size: 30px; }
    p { line-height: 1.45; }
    a.button { display: block; margin-top: 16px; padding: 15px 18px; border-radius: 8px; background: #5b2da3; color: white; text-align: center; text-decoration: none; font-weight: 800; }
    a.secondary { background: #efe7fa; color: #3a2750; }
    a.disabled { pointer-events: none; opacity: .48; }
    .muted { color: #6c5b79; font-size: 14px; }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <h1>Luna App</h1>
      <p id="message">Pasirink, kuriam telefonui nori įdiegti Luna App.</p>
      <a id="androidDownload" class="button" href="https://raw.githubusercontent.com/ponkuz/PUBLIC/main/luna-family-app/luna-family-app-latest.apk">Atsisiųsti Android APK</a>
      <a id="iosDownload" class="button secondary" href="">Atidaryti iPhone nuorodą</a>
      <p class="muted">Versija 0.1.23+24. Android gali paprašyti leidimo įdiegti programėlę iš naršyklės ar failų programos.</p>
    </div>
  </main>
  <script>
    const androidUrl = "https://raw.githubusercontent.com/ponkuz/PUBLIC/main/luna-family-app/luna-family-app-latest.apk";
    const iosUrl = "";
    const userAgent = navigator.userAgent || navigator.vendor || window.opera;
    const message = document.getElementById('message');
    const androidDownload = document.getElementById('androidDownload');
    const iosDownload = document.getElementById('iosDownload');

    androidDownload.href = androidUrl;
    if (iosUrl) {
      iosDownload.href = iosUrl;
    } else {
      iosDownload.classList.add('disabled');
      iosDownload.removeAttribute('href');
      iosDownload.textContent = 'iPhone nuoroda dar neparuošta';
    }

    if (/android/i.test(userAgent)) {
      message.textContent = 'Atpažintas Android telefonas. Spausk mygtuką ir atsisiųsk APK.';
      // Automatinio peradresavimo nedarome, kad puslapis liktų aiškus pasirinkimas.
    } else if (/iPad|iPhone|iPod/.test(userAgent)) {
      if (iosUrl) {
        message.textContent = 'Atpažintas iPhone. Spausk iPhone nuorodos mygtuką.';
      } else {
        message.textContent = 'iPhone versijai dar reikia TestFlight arba Apple platinimo nuorodos. Kol kas paruoštas Android APK.';
      }
    } else {
      message.textContent = 'Pasirink atsisiuntimą. Android telefonui naudok APK.';
    }
  </script>
</body>
</html>
